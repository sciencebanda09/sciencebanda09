<svg width="900" height="280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="50%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#0a0a1a"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="40%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#ff2d78"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00d4ff"/>
      <stop offset="70%" style="stop-color:#7b2fff"/>
      <stop offset="100%" style="stop-color:#ff2d78;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="12"/>
  
  <!-- Grid lines -->
  <g opacity="0.06" stroke="#00d4ff" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="500" y1="0" x2="500" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
  </g>
  
  <!-- Corner accents -->
  <polyline points="20,20 20,50 50,50" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  <polyline points="880,20 880,50 850,50" fill="none" stroke="#ff2d78" stroke-width="2" opacity="0.8"/>
  <polyline points="20,260 20,230 50,230" fill="none" stroke="#7b2fff" stroke-width="2" opacity="0.8"/>
  <polyline points="880,260 880,230 850,230" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8"/>
  
  <!-- Glowing orbs -->
  <circle cx="120" cy="140" r="60" fill="#7b2fff" opacity="0.06"/>
  <circle cx="780" cy="140" r="80" fill="#00d4ff" opacity="0.05"/>
  
  <!-- Main name -->
  <text x="450" y="115" font-family="'Courier New', monospace" font-size="72" font-weight="900"
    fill="url(#nameGrad)" text-anchor="middle" filter="url(#glow)" letter-spacing="8">SHASHANK</text>
  <text x="450" y="185" font-family="'Courier New', monospace" font-size="72" font-weight="900"
    fill="url(#nameGrad)" text-anchor="middle" filter="url(#glow)" letter-spacing="8">DEV</text>

  <!-- Divider line -->
  <rect x="100" y="200" width="700" height="2" fill="url(#lineGrad)" rx="1"/>
  
  <!-- Subtitle chips -->
  <rect x="122" y="215" width="110" height="24" rx="4" fill="#00d4ff" opacity="0.12"/>
  <text x="177" y="232" font-family="'Courier New', monospace" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="bold">DEFENSE AI</text>
  
  <rect x="244" y="215" width="100" height="24" rx="4" fill="#7b2fff" opacity="0.12"/>
  <text x="294" y="232" font-family="'Courier New', monospace" font-size="11" fill="#a78bff" text-anchor="middle" font-weight="bold">ROBOTICS</text>
  
  <rect x="356" y="215" width="80" height="24" rx="4" fill="#ff2d78" opacity="0.12"/>
  <text x="396" y="232" font-family="'Courier New', monospace" font-size="11" fill="#ff6b9d" text-anchor="middle" font-weight="bold">RL</text>
  
  <rect x="448" y="215" width="110" height="24" rx="4" fill="#00ffaa" opacity="0.10"/>
  <text x="503" y="232" font-family="'Courier New', monospace" font-size="11" fill="#00ffaa" text-anchor="middle" font-weight="bold">ALIGNMENT</text>
  
  <rect x="570" y="215" width="80" height="24" rx="4" fill="#ffd700" opacity="0.10"/>
  <text x="610" y="232" font-family="'Courier New', monospace" font-size="11" fill="#ffd700" text-anchor="middle" font-weight="bold">NeurIPS</text>
  
  <rect x="662" y="215" width="120" height="24" rx="4" fill="#ff6600" opacity="0.10"/>
  <text x="722" y="232" font-family="'Courier New', monospace" font-size="11" fill="#ff9944" text-anchor="middle" font-weight="bold">BIHAR → WORLD</text>
  
  <!-- Corner labels -->
  <text x="28" y="38" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.6">SD_v2026</text>
  <text x="820" y="38" font-family="'Courier New', monospace" font-size="9" fill="#ff2d78" opacity="0.6" text-anchor="end">SENTRIX.LAB</text>
  <text x="28" y="272" font-family="'Courier New', monospace" font-size="9" fill="#7b2fff" opacity="0.6">19 · Patna, Bihar</text>
  <text x="872" y="272" font-family="'Courier New', monospace" font-size="9" fill="#00d4ff" opacity="0.6" text-anchor="end">SYSTEM::ONLINE</text>
</svg>